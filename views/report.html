<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report - ShadowHunt</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .infected-line {
            background: rgba(255, 68, 68, 0.3);
            border-left: 3px solid #ff4444;
            padding: 8px;
            margin: 5px 0;
            font-family: monospace;
        }
        .clean-line {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid #00ff88;
            padding: 8px;
            margin: 5px 0;
            font-family: monospace;
        }
        .keyword-badge {
            display: inline-block;
            background: #ff4444;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 5px;
            font-size: 12px;
        }
        pre {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 400px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo logo-clickable" onclick="logout()">🔍 SHADOWHUNT</div>
            <div class="nav-links">
                <a href="/dashboard">DASHBOARD</a>
                <a href="/upload">UPLOAD</a>
                <a href="/logout">EXIT</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="analytics-card" id="reportContent">
            <div class="card-header">
                <h3>📋 Loading report...</h3>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if(confirm('Exit ShadowHunt?')) window.location.href = '/logout';
        }

        async function loadReport() {
            const filename = window.location.pathname.split('/').pop();
            const response = await fetch(`/api/scan-details/${encodeURIComponent(filename)}`);
            const scan = await response.json();
            
            if (!scan) {
                document.getElementById('reportContent').innerHTML = '<h3>Report not found</h3><a href="/dashboard">Back to Dashboard</a>';
                return;
            }
            
            const analysis = scan.analysis;
            const keywords = scan.detectedKeywords || [];
            const preview = scan.filePreview || [];
            
            document.getElementById('reportContent').innerHTML = `
                <div class="card-header">
                    <h3>📋 FORENSIC ANALYSIS REPORT</h3>
                    <span class="card-badge">${new Date(scan.timestamp).toLocaleString()}</span>
                </div>
                
                <p><strong>File:</strong> ${scan.filename}</p>
                <p><strong>Threat Level:</strong> <span style="color: ${analysis.threatLevel === 'high' ? '#ff4444' : (analysis.threatLevel === 'medium' ? '#ffaa00' : '#00ff88')}; font-size: 1.3rem; font-weight: bold;">${analysis.threatLevel.toUpperCase()}</span></p>
                <p><strong>Threat Score:</strong> ${analysis.threatScore}/100</p>
                <p><strong>Infected Lines:</strong> ${analysis.infectedLines} | <strong>Clean Lines:</strong> ${analysis.cleanLines}</p>
                
                <h3 style="margin-top: 20px;">🔍 Detected Threat Keywords</h3>
                <div style="margin-bottom: 20px;">
                    ${keywords.map(k => `<span class="keyword-badge">⚠️ ${k.keyword} (${k.severity})</span>`).join('') || '<p>✅ No threats detected</p>'}
                </div>
                
                <h3>📝 File Content Analysis</h3>
                <pre>
${preview.map(line => {
    const isInfected = line.toLowerCase().includes('ransomware') || 
                       line.toLowerCase().includes('backdoor') ||
                       line.toLowerCase().includes('eval') ||
                       line.toLowerCase().includes('exec') ||
                       line.toLowerCase().includes('base64');
    return (isInfected ? '❌ ' : '✅ ') + line;
}).join('\n')}
                </pre>
                
                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button class="btn-primary" onclick="location.href='/dashboard'">← Back to Dashboard</button>
                    <button class="btn-secondary" onclick="location.href='/upload'">📤 Upload New File</button>
                </div>
            `;
        }
        
        loadReport();
    </script>
</body>
</html>
