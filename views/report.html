<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report - ShadowHunt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1117 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .navbar {
            background: rgba(5, 10, 30, 0.95);
            padding: 1rem 2rem;
            border-bottom: 1px solid #00c6ff;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #00c6ff; cursor: pointer; }
        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 2rem;
        }
        .nav-links a:hover { color: #00c6ff; }
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        .report-card {
            background: rgba(15, 25, 55, 0.9);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #00c6ff;
        }
        .threat-high { color: #ff4444; font-size: 1.5rem; font-weight: bold; }
        .threat-medium { color: #ffaa00; font-size: 1.5rem; font-weight: bold; }
        .threat-low { color: #00ff88; font-size: 1.5rem; font-weight: bold; }
        .keyword-badge {
            display: inline-block;
            background: rgba(255, 68, 68, 0.3);
            border: 1px solid #ff4444;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 5px;
            font-size: 12px;
        }
        .image-report {
            background: rgba(0, 198, 255, 0.1);
            border: 1px solid #00c6ff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00c6ff, #667eea);
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid #00c6ff;
            color: #00c6ff;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 198, 255, 0.3);
        }
        .card-header h3 { color: #00c6ff; }
        pre {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 400px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="logout()">🔍 SHADOWHUNT</div>
            <div class="nav-links">
                <a href="/dashboard">DASHBOARD</a>
                <a href="/upload">UPLOAD</a>
                <a href="/logout">EXIT</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="report-card" id="reportContent">
            <div class="card-header">
                <h3>📋 Loading report...</h3>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if(confirm('Exit ShadowHunt?')) window.location.href = '/logout';
        }

        async function loadReport() {
            try {
                const filename = window.location.pathname.split('/').pop();
                console.log('Loading report for:', filename);
                
                const response = await fetch(`/api/scan-details/${encodeURIComponent(filename)}`);
                const scan = await response.json();
                
                console.log('Scan data:', scan);
                
                if (!scan) {
                    document.getElementById('reportContent').innerHTML = `
                        <div class="card-header">
                            <h3>❌ Report not found</h3>
                        </div>
                        <p>No scan found with filename: ${filename}</p>
                        <button class="btn-primary" onclick="location.href='/dashboard'">← Back to Dashboard</button>
                    `;
                    return;
                }
                
                const analysis = scan.analysis;
                const keywords = scan.detectedKeywords || [];
                const preview = scan.filePreview || [];
                const fileType = analysis.fileType || '';
                const isImage = fileType === '.png' || fileType === '.jpg' || fileType === '.jpeg' || fileType === '.gif';
                
                let threatClass = '';
                let threatColor = '';
                if (analysis.threatLevel === 'high') {
                    threatClass = 'threat-high';
                    threatColor = '#ff4444';
                } else if (analysis.threatLevel === 'medium') {
                    threatClass = 'threat-medium';
                    threatColor = '#ffaa00';
                } else {
                    threatClass = 'threat-low';
                    threatColor = '#00ff88';
                }
                
                let contentPreview = '';
                
                if (isImage) {
                    // For images - show clean image report
                    const sizeMB = (analysis.fileSize / (1024 * 1024)).toFixed(2);
                    const stegoRisk = keywords.length > 0 ? '⚠️ STEGANOGRAPHY SUSPECTED' : '✅ CLEAN';
                    
                    contentPreview = `
                        <div class="image-report">
                            <p style="font-size: 4rem;">🖼️</p>
                            <h3>IMAGE FORENSICS REPORT</h3>
                            <p><strong>File Type:</strong> ${fileType.toUpperCase()}</p>
                            <p><strong>File Size:</strong> ${sizeMB} MB</p>
                            <p><strong>Steganography Scan:</strong> <span style="color: ${keywords.length > 0 ? '#ff4444' : '#00ff88'}">${stegoRisk}</span></p>
                            <hr style="margin: 15px 0; border-color: #00c6ff;">
                            <p style="text-align: left;"><strong>What was checked:</strong></p>
                            <ul style="text-align: left; margin-left: 20px;">
                                <li>✅ LSB (Least Significant Bit) manipulation</li>
                                <li>✅ Pixel value anomalies</li>
                                <li>✅ Hidden data embedding patterns</li>
                                <li>✅ File header integrity</li>
                                <li>✅ Metadata forensics</li>
                            </ul>
                            <p style="margin-top: 15px;"><strong>${keywords.length > 0 ? '⚠️ Suspicious patterns detected! The image may contain hidden data.' : '✅ No steganography detected. The image appears clean.'}</strong></p>
                        </div>
                    `;
                } else {
                    // For text files - show actual content with highlighting
                    let lines = preview;
                    contentPreview = `
                        <pre>
${lines.map(line => {
    // Escape HTML to prevent XSS
    const escapedLine = line.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
    
    const isInfected = escapedLine.toLowerCase().includes('ransomware') || 
                       escapedLine.toLowerCase().includes('backdoor') ||
                       escapedLine.toLowerCase().includes('trojan') ||
                       escapedLine.toLowerCase().includes('keylogger') ||
                       escapedLine.toLowerCase().includes('eval') ||
                       escapedLine.toLowerCase().includes('exec') ||
                       escapedLine.toLowerCase().includes('base64');
    return (isInfected ? '❌ ' : '✅ ') + escapedLine;
}).join('\n')}
                        </pre>
                    `;
                }
                
                document.getElementById('reportContent').innerHTML = `
                    <div class="card-header">
                        <h3>📋 FORENSIC ANALYSIS REPORT</h3>
                        <span style="font-size: 0.8rem;">${new Date(scan.timestamp).toLocaleString()}</span>
                    </div>
                    
                    <p><strong>File:</strong> ${scan.filename}</p>
                    <p><strong>Threat Level:</strong> <span class="${threatClass}">${analysis.threatLevel.toUpperCase()}</span></p>
                    <p><strong>Threat Score:</strong> ${analysis.threatScore}/100</p>
                    <p><strong>Infected Lines:</strong> ${analysis.infectedLines} | <strong>Clean Lines:</strong> ${analysis.cleanLines}</p>
                    
                    <h3 style="margin-top: 20px;">🔍 Detected Threat Keywords</h3>
                    <div style="margin-bottom: 20px;">
                        ${keywords.length > 0 ? keywords.map(k => `<span class="keyword-badge">⚠️ ${k.keyword} (${k.severity})</span>`).join('') : '<p>✅ No threats detected</p>'}
                    </div>
                    
                    <h3>📝 File Content Analysis</h3>
                    ${contentPreview}
                    
                    <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px;">
                        <h4>📊 Summary</h4>
                        <p>Total Threats Found: ${keywords.length}</p>
                        <p>Risk Assessment: ${analysis.threatScore >= 70 ? '🔴 CRITICAL - Immediate action required' : 
                                           (analysis.threatScore >= 35 ? '🟡 WARNING - Review recommended' : '🟢 SAFE - No immediate action needed')}</p>
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn-primary" onclick="location.href='/dashboard'">← Back to Dashboard</button>
                        <button class="btn-secondary" onclick="location.href='/upload'">📤 Upload New File</button>
                        <button class="btn-primary" onclick="window.print()">🖨️ PRINT / SAVE PDF</button>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading report:', error);
                document.getElementById('reportContent').innerHTML = `
                    <div class="card-header">
                        <h3>❌ Error loading report</h3>
                    </div>
                    <p>${error.message}</p>
                    <button class="btn-primary" onclick="location.href='/dashboard'">← Back to Dashboard</button>
                `;
            }
        }
        
        loadReport();
    </script>
</body>
</html>
