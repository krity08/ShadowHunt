<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ShadowHunt</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .scan-card {
            background: rgba(15, 25, 55, 0.9);
            border-left: 4px solid #00c6ff;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .scan-card:hover {
            transform: translateX(5px);
            background: rgba(0, 198, 255, 0.1);
        }
        .scan-card.high { border-left-color: #ff4444; }
        .scan-card.medium { border-left-color: #ffaa00; }
        .scan-card.low { border-left-color: #00ff88; }
        .scan-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .scan-meta {
            font-size: 0.8rem;
            color: #8b9dc3;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .badge.high { background: #ff4444; color: white; }
        .badge.medium { background: #ffaa00; color: #1a1a3e; }
        .badge.low { background: #00ff88; color: #1a1a3e; }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #8b9dc3;
        }
        .btn-upload {
            background: linear-gradient(135deg, #00c6ff, #667eea);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 198, 255, 0.4);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(10, 14, 39, 0.95);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 198, 255, 0.2);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-number.high { color: #ff4444; }
        .stat-number.medium { color: #ffaa00; }
        .stat-number.low { color: #00ff88; }
        .stat-label {
            font-size: 0.8rem;
            color: #8b9dc3;
        }
        .threat-circle {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .threat-circle.high { background: #ff4444; box-shadow: 0 0 5px #ff4444; }
        .threat-circle.medium { background: #ffaa00; box-shadow: 0 0 5px #ffaa00; }
        .threat-circle.low { background: #00ff88; box-shadow: 0 0 5px #00ff88; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo logo-clickable" onclick="logout()">🔍 SHADOWHUNT</div>
            <div class="nav-links">
                <a href="/dashboard">DASHBOARD</a>
                <a href="/upload">UPLOAD</a>
                <a href="/logout">EXIT</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>⚡ INCIDENT DASHBOARD</h1>
            <button class="btn-upload" onclick="location.href='/upload'">+ UPLOAD NEW FILE</button>
        </div>

        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalScans">0</div>
                <div class="stat-label">Total Scans</div>
            </div>
            <div class="stat-box">
                <div class="stat-number high" id="highCount">0</div>
                <div class="stat-label">High Severity</div>
            </div>
            <div class="stat-box">
                <div class="stat-number low" id="lowCount">0</div>
                <div class="stat-label">Clean Files</div>
            </div>
        </div>

        <!-- Clean vs Infected Chart -->
        <div class="analytics-card" style="margin-bottom: 30px;">
            <div class="card-header">
                <h3>📊 CLEAN VS INFECTED LINES</h3>
            </div>
            <canvas id="linesChart" height="100"></canvas>
        </div>

        <!-- Scan History -->
        <div class="analytics-card">
            <div class="card-header">
                <h3>📋 SCAN HISTORY</h3>
                <span class="card-badge">Click any scan for detailed report</span>
            </div>
            <div id="scansList">
                <div class="empty-state">No scans yet. Upload a file to get started!</div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if(confirm('Exit ShadowHunt?')) window.location.href = '/logout';
        }

        async function loadDashboard() {
            try {
                const res = await fetch('/api/dashboard-data');
                const data = await res.json();
                
                document.getElementById('totalScans').textContent = data.totalScans;
                document.getElementById('highCount').textContent = data.highThreatCount;
                document.getElementById('lowCount').textContent = data.totalScans - data.highThreatCount;
                
                const ctx = document.getElementById('linesChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Clean Lines', 'Infected Lines'],
                        datasets: [{
                            data: [data.totalClean, data.totalInfected],
                            backgroundColor: ['#00ff88', '#ff4444'],
                            borderRadius: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: '#e0e0e0' } } },
                        scales: { y: { beginAtZero: true, ticks: { color: '#e0e0e0' } } }
                    }
                });
                
                const scansList = document.getElementById('scansList');
                if (data.recentScans.length === 0) {
                    scansList.innerHTML = '<div class="empty-state">📁 No scans yet. Click "UPLOAD NEW FILE" to get started!</div>';
                } else {
                    scansList.innerHTML = data.recentScans.map(scan => `
                        <div class="scan-card ${scan.analysis.threatLevel}" onclick="viewReport('${scan.filename}')">
                            <div class="scan-title">
                                <span class="threat-circle ${scan.analysis.threatLevel}"></span>
                                📄 ${scan.filename}
                                <span class="badge ${scan.analysis.threatLevel}" style="float: right;">${scan.analysis.threatLevel.toUpperCase()}</span>
                            </div>
                            <div class="scan-meta">
                                <span>🎯 Score: ${scan.analysis.threatScore}/100</span>
                                <span>🔍 Infected: ${scan.analysis.infectedLines} lines</span>
                                <span>✅ Clean: ${scan.analysis.cleanLines} lines</span>
                                <span>⏱️ ${new Date(scan.timestamp).toLocaleString()}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function viewReport(filename) {
            window.location.href = `/report/${encodeURIComponent(filename)}`;
        }

        loadDashboard();
        setInterval(loadDashboard, 10000);
    </script>
</body>
</html>
