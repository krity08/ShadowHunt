<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ShadowHunt</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🔍 ShadowHunt</div>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/upload">Upload</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="upload-container">
        <div class="upload-card">
            <h2>📁 Upload File for Threat Analysis</h2>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Select File:</label>
                    <input type="file" name="file" required>
                </div>
                <button type="submit" class="btn-primary">Analyze Threat</button>
            </form>
            <div class="info-box">
                <h4>Supported File Types:</h4>
                <p>Images (JPG, PNG) - Checks for LSB steganography</p>
                <p>Executables (EXE, BAT, SH) - Malware detection</p>
                <p>Documents (PDF, DOCM, XLSM) - Macro threats</p>
                <p>Scripts (JS, VBS) - Suspicious code analysis</p>
            </div>
        </div>
    </div>
</body>
</html>
